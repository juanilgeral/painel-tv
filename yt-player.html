<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Player — Juanil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100vw; height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1em;
    }
    p { color: #f0a500; font-family: monospace; font-size: 1.5vw; }
    a {
      color: #fff;
      font-family: monospace;
      font-size: 1.2vw;
      text-decoration: none;
      background: #f0a500;
      color: #000;
      padding: 0.5em 2em;
      border-radius: 6px;
      font-weight: 700;
    }
  </style>
  <script>
    // Redireciona automaticamente para a URL do YouTube
    // O Fully abre o player oficial dentro do kiosk, sem embed, sem bloqueio
    function init() {
      const params = new URLSearchParams(window.location.search);
      const url = params.get('url') || params.get('v')
        ? 'https://www.youtube.com/watch?v=' + params.get('v')
        : null;

      const destino = params.get('url')
        ? decodeURIComponent(params.get('url'))
        : params.get('v')
          ? 'https://www.youtube.com/watch?v=' + params.get('v')
          : null;

      if (destino) {
        // Redirect imediato — Fully abre o player oficial do YouTube
        window.location.replace(destino);
      } else {
        document.getElementById('erro').style.display = 'flex';
      }
    }
  </script>
</head>
<body onload="init()">
  <div id="erro" style="display:none; flex-direction:column; align-items:center; gap:1em;">
    <p>⚠ Nenhum vídeo informado.</p>
    <a href="https://juanilgeral.github.io/painel-tv/juanil-painel.html">← Voltar ao Painel</a>
  </div>
</body>
</html>

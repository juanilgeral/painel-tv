<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juanil — Painel de Avisos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#0d2348;--azul2:#1a3a6b;--azul3:#2457a4;--acc:#f0a500;--br:#ffffff;--muted:#a0b4cc;}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--azul2);color:var(--br);font-family:'Barlow',sans-serif;}

#painel{width:100vw;height:100vh;display:flex;flex-direction:column;}

/* HEADER */
#header{height:13vh;display:flex;align-items:center;justify-content:space-between;padding:0 3vw;background:var(--azul);border-bottom:3px solid var(--acc);position:relative;flex-shrink:0;}
#logo-wrap img{height:9vh;object-fit:contain;}
#header-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
#header-center h1{font-family:'Barlow Condensed',sans-serif;font-size:3.2vw;font-weight:900;color:var(--acc);letter-spacing:0.3vw;text-transform:uppercase;white-space:nowrap;}
#header-center small{display:block;font-size:1.1vw;color:var(--muted);letter-spacing:0.2vw;margin-top:0.3vh;}
#relogio-wrap{text-align:right;}
#relogio{font-family:'Barlow Condensed',sans-serif;font-size:4.5vw;font-weight:900;color:var(--acc);line-height:1;}
#data-label{font-size:1.1vw;color:var(--muted);margin-top:0.3vh;white-space:nowrap;}

/* CORPO */
#corpo{display:flex;flex:1;overflow:hidden;}

/* ESQUERDA */
#painel-esq{width:57vw;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.1);position:relative;overflow:hidden;}
#aviso-area{flex:1;padding:4vh 4vw;display:flex;flex-direction:column;justify-content:center;position:relative;}
#aviso-area::before{content:'';position:absolute;top:0;left:3vw;right:3vw;height:2px;background:linear-gradient(90deg,transparent,var(--acc),transparent);}
#aviso-icone{display:none;}
#aviso-tag{font-family:'Barlow Condensed',sans-serif;font-size:1.8vw;font-weight:700;letter-spacing:0.4vw;text-transform:uppercase;color:var(--acc);margin-bottom:1.5vh;display:flex;align-items:center;gap:0.8vw;}
#aviso-tag::before{content:'';width:1.5vw;height:2px;background:var(--acc);}
#aviso-titulo{font-family:'Barlow Condensed',sans-serif;font-size:6.5vw;font-weight:900;line-height:1.05;color:#fff;margin-bottom:1.5vh;}
#aviso-texto{font-size:2.4vw;line-height:1.6;color:rgba(255,255,255,.85);font-weight:300;}
#progresso-aviso{height:4px;width:0%;background:var(--acc);box-shadow:0 0 8px var(--acc);transition:width linear;flex-shrink:0;}

/* VIDEO */
#player-video-wrap{display:none;position:absolute;inset:0;z-index:50;background:#000;}
#player-video-wrap video{width:100%;height:100%;object-fit:contain;}
.btn-fechar-video{position:absolute;top:1vh;right:1vw;background:rgba(0,0,0,.8);border:none;color:#fff;border-radius:50%;width:4vh;height:4vh;cursor:pointer;font-size:2vh;z-index:101;}

/* DIREITA */
#painel-dir{flex:1;display:flex;flex-direction:column;background:#0f2040;}

/* CLIMA */
#clima-box{padding:2vh 2.5vw;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.15);flex-shrink:0;}
#clima-tag{font-family:'Barlow Condensed',sans-serif;font-size:1.1vw;font-weight:700;letter-spacing:0.3vw;text-transform:uppercase;color:var(--acc);margin-bottom:1vh;}
#clima-main{display:flex;align-items:center;gap:1.5vw;}
#clima-icone{font-size:4.5vh;line-height:1;}
#clima-temp{font-family:'Barlow Condensed',sans-serif;font-size:5.5vh;font-weight:900;color:var(--acc);line-height:1;}
#clima-temp sup{font-size:2.5vh;vertical-align:top;margin-top:0.5vh;}
#clima-info h3{font-family:'Barlow Condensed',sans-serif;font-size:2.2vh;color:#fff;margin-bottom:0.3vh;}
#clima-info p{font-size:1.5vh;color:var(--muted);}

#frase-box{flex:1;padding:2vh 3vw;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);}
.frase-icone{font-size:3.5vh;margin-bottom:1.5vh;opacity:.7;}
#frase-texto{font-family:'Barlow Condensed',sans-serif;font-size:2.6vw;font-weight:600;line-height:1.4;color:#f0ead8;font-style:italic;}
#frase-autor{margin-top:1vh;font-size:1.4vw;color:var(--muted);}

#aniv-box{padding:2vh 2.5vw;border-bottom:1px solid rgba(255,255,255,.08);}
.lateral-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3vw;font-weight:700;letter-spacing:0.3vw;text-transform:uppercase;color:var(--muted);margin-bottom:1.2vh;}
.aniv-item{display:flex;align-items:center;gap:0.8vw;padding:0.7vh 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:1.6vw;color:#fff;}
.aniv-item:last-child{border:none}
.aniv-dia{background:var(--acc);color:var(--azul);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.3vw;padding:2px 8px;border-radius:4px;min-width:4.5vw;text-align:center;}

#midia-box{padding:1.5vh 2vw;background:#081828;display:flex;align-items:center;gap:1vw;flex-wrap:wrap;flex-shrink:0;}
.midia-title{font-family:'Barlow Condensed',sans-serif;font-size:1.2vw;font-weight:700;letter-spacing:0.2vw;text-transform:uppercase;color:var(--acc);white-space:nowrap;}
.btn-midia{padding:0.5vh 1.2vw;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:var(--muted);font-size:1.2vw;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;}
.btn-midia:hover{background:var(--acc);border-color:var(--acc);color:var(--azul);}
.midia-url-wrap{display:flex;gap:0.5vw;flex:1;}
#midia-url-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:0.5vh 0.8vw;color:#fff;font-size:1.2vw;outline:none;}
#midia-url-input:focus{border-color:var(--acc)}
.btn-tocar{padding:0.5vh 1.5vw;background:var(--acc);border:none;border-radius:6px;color:var(--azul);font-weight:700;font-size:1.2vw;cursor:pointer;}
.midia-status{font-size:1.1vw;color:var(--muted);}
.midia-status.tocando{color:#34d399;}
#player-audio{display:none;}

/* TICKER */
#ticker-bar{height:6vh;flex-shrink:0;display:flex;align-items:center;overflow:hidden;background:var(--azul);border-top:2px solid var(--azul3);}
#ticker-label{background:var(--acc);color:var(--azul);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8vw;padding:0 2vw;height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0;clip-path:polygon(0 0,calc(100% - 1vw) 0,100% 50%,calc(100% - 1vw) 100%,0 100%);padding-right:2.5vw;}
#ticker-scroll{flex:1;overflow:hidden;height:100%;}
#ticker-text{white-space:nowrap;font-size:2vw;font-weight:500;color:#fff;animation:ticker 60s linear infinite;display:inline-block;padding-left:100%;}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

#fk-status{position:fixed;top:4px;right:8px;font-size:10px;color:rgba(255,255,255,.4);z-index:200;}
</style>
</head>
<body>
<div id="fk-status">⚙</div>
<div id="painel">
  <div id="header">
    <div id="logo-wrap"><img id="logo-img" src="" alt="Juanil"></div>
    <div id="header-center">
      <h1>Painel de Comunicação</h1>
      <small>Informações &amp; Avisos Internos</small>
    </div>
    <div id="relogio-wrap">
      <div id="relogio">00:00</div>
      <div id="data-label">—</div>
    </div>
  </div>
  <div id="corpo">
    <div id="painel-esq">
      <div id="aviso-area">
        <div id="aviso-icone">📢</div>
        <div id="aviso-tag">Avisos &amp; Comunicados</div>
        <div id="aviso-titulo">Carregando...</div>
        <div id="aviso-texto"></div>
      </div>
      <div id="progresso-aviso"></div>
      <div id="player-video-wrap">
        <button class="btn-fechar-video" onclick="fecharVideo()">✕</button>
        <div id="player-video-inner"></div>
      </div>
    </div>
    <div id="painel-dir">
      <div id="clima-box">
        <div id="clima-tag">✦ Previsão do Tempo · Nova Iguaçu, RJ</div>
        <div id="clima-main">
          <div id="clima-icone">🌤️</div>
          <div id="clima-temp">--<sup>°C</sup></div>
          <div id="clima-info">
            <h3 id="clima-desc">Carregando...</h3>
            <p id="clima-detalhes"></p>
          </div>
        </div>
      </div>
      <div id="frase-box">
        <div class="frase-icone">💡</div>
        <div id="frase-texto">Carregando...</div>
        <div id="frase-autor"></div>
      </div>
      <div id="aniv-box">
        <div class="lateral-title">🎂 Aniversariantes</div>
        <div id="aniversarios-lista"><div style="font-size:1.4vw;color:var(--muted)">Nenhum aniversariante hoje</div></div>
      </div>
      <div id="midia-box">
        <div class="midia-title">🎵 Mídia</div>
        <button class="btn-midia" onclick="tocarRadio()">📻 JB FM</button>
        <button class="btn-midia" id="btn-parar" onclick="pararTudo()" style="display:none">⏹ Parar</button>
        <div class="midia-url-wrap">
          <input id="midia-url-input" type="text" placeholder="YouTube, Drive ou MP4...">
          <button class="btn-tocar" onclick="tocarURL()">▶ Tocar</button>
        </div>
        <div class="midia-status" id="midia-status">Parado</div>
      </div>
    </div>
  </div>
  <div id="ticker-bar">
    <div id="ticker-label">📡 AVISO</div>
    <div id="ticker-scroll"><div id="ticker-text">Bem-vindo à Juanil Transportes e Locações!</div></div>
  </div>
</div>

      document.getElementById('clima-temp').innerHTML=Math.round(cv.temperature_2m)+'<sup>°C</sup>';

      document.getElementById('clima-detalhes').textContent='Sensação '+Math.round(cv.apparent_temperature)+'°C  ·  Umidade '+cv.relative_humidity_2m+'%  ·  Vento '+Math.round(cv.windspeed_10m)+' km/h';
    }catch(e){}
  }

  function initFully(){
    document.getElementById('fk-status').textContent=window.innerWidth+'x'+window.innerHeight;
    if(typeof fully!=='undefined'){
      fullyKiosk=fully;
      document.getElementById('fk-status').style.color='#34d399';
      fullyKiosk.setFullScreen(true);fullyKiosk.turnScreenOn();
    }
  }

  function atualizarRelogio(){
    const d=new Date();
    document.getElementById('relogio').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    const dias=['Domingo','Segunda-Feira','Terca-Feira','Quarta-Feira','Quinta-Feira','Sexta-Feira','Sabado'];
    const meses=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    document.getElementById('data-label').textContent=dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
  }
  atualizarRelogio(); setInterval(atualizarRelogio,1000);

  function mostrarAviso(a){
    if(!a) return;
    if(a.midia){tocarVideoArquivo(a.midia,false);agendarProx(TEMPO_AVISO*3);return;}
    document.getElementById('aviso-icone').textContent=a.icone;
    document.getElementById('aviso-tag').textContent=a.tag;
    document.getElementById('aviso-titulo').textContent=a.titulo;
    document.getElementById('aviso-texto').textContent=a.texto;
    const b=document.getElementById('progresso-aviso');
    b.style.transition='none';b.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      b.style.transition='width '+TEMPO_AVISO+'ms linear';b.style.width='100%';
    }));
    agendarProx(TEMPO_AVISO);
  }
  function agendarProx(ms){clearTimeout(avisoTimer);avisoTimer=setTimeout(()=>{avisoIdx=(avisoIdx+1)%avisos.length;mostrarAviso(avisos[avisoIdx]);},ms);}

  function setStatus(msg,tocando=false){
    const el=document.getElementById('midia-status');
    el.textContent=msg;el.className='midia-status'+(tocando?' tocando':'');
    document.getElementById('btn-parar').style.display=tocando?'inline-block':'none';
  }
  function pararAudio(){const a=document.getElementById('player-audio');a.pause();a.src='';radioAtiva=false;}
  function pararTudo(){pararAudio();fecharVideoSemRetomar();setStatus('Parado');}

  function tocarRadio(){
    pararTudo();
    const a=document.getElementById('player-audio');
    a.src=JBFM_STREAM;
    a.load();
    const tryPlay=()=>{
      a.play().then(()=>{radioAtiva=true;setStatus('JB FM ao vivo',true);})
              .catch(()=>{
                // Tenta novamente em 3s (aguarda interacao no browser comum)
                setTimeout(()=>{
                  a.play().then(()=>{radioAtiva=true;setStatus('JB FM ao vivo',true);})
                          .catch(()=>setStatus('JB FM — clique para tocar'));
                },3000);
              });
    };
    setTimeout(tryPlay, 500);
  }

  function converterDriveUrl(url){const m=url.match(/drive\.google\.com\/file\/d\/([^/]+)/);return m?'https://drive.google.com/uc?export=download&id='+m[1]:url;}
  function isYoutube(url){return url.includes('youtube.com')||url.includes('youtu.be');}
  function abrirYoutubeExterno(url){
    // Tenta abrir via Fully Kiosk API
    if(fullyKiosk){
      try{ fullyKiosk.openBrowser(url); return; }catch(e){}
      try{ fullyKiosk.startApplication('com.google.android.youtube',url); return; }catch(e){}
    }
    // Fallback: location redirect
    try{ window.location.href=url; }catch(e){}
    // Último recurso: nova aba
    window.open(url,'_blank');
  }
  function tocarURL(){const url=document.getElementById('midia-url-input').value.trim();if(url)_tocarUrlInterna(url);}

  function _tocarUrlInterna(url){
    const ret=radioAtiva;if(radioAtiva)pararAudio();
    if(isYoutube(url)){abrirYoutubeExterno(url);setStatus('YouTube aberto',true);return;}
    url=converterDriveUrl(url);
    if(/\.(mp3|aac|ogg|wav|m4a)$/i.test(url))tocarAudioUrl(url);
    else tocarVideoArquivo(url,ret);
  }
  function tocarAudioUrl(url){const a=document.getElementById('player-audio');a.src=url;a.play().then(()=>setStatus('Audio tocando',true)).catch(()=>setStatus('Erro no audio'));}
  function tocarVideoArquivo(url,ret=false){
    document.getElementById('player-video-inner').innerHTML='<video src="'+url+'" autoplay controls style="width:100%;height:100%;object-fit:contain;background:#000" data-retomar="'+ret+'" onended="aoTerminarVideo()"></video>';
    document.getElementById('player-video-wrap').style.display='block';
    videoAtivo=true;setStatus('Video tocando',true);
  }
  function fecharVideo(){const el=document.getElementById('player-video-inner').querySelector('[data-retomar]');const ret=el&&el.dataset.retomar==='true';fecharVideoSemRetomar();if(ret)setTimeout(()=>tocarRadio(),500);}
  function fecharVideoSemRetomar(){document.getElementById('player-video-wrap').style.display='none';document.getElementById('player-video-inner').innerHTML='';videoAtivo=false;if(!radioAtiva)setStatus('Parado');}
  function aoTerminarVideo(){if(modoPlaylist)proximoVideo();else fecharVideo();}
  function proximoVideo(){if(!modoPlaylist||!playlist.length)return;playlistIndex=(playlistIndex+1)%playlist.length;_tocarPlaylistItem(playlist[playlistIndex]);}
  function _tocarPlaylistItem(url){
    const ret=radioAtiva;if(radioAtiva)pararAudio();
    if(isYoutube(url)){abrirYoutubeExterno(url);setTimeout(proximoVideo,5000);return;}
    url=converterDriveUrl(url);
    document.getElementById('player-video-inner').innerHTML='<video src="'+url+'" autoplay style="width:100%;height:100%;object-fit:contain;background:#000" data-retomar="'+ret+'" onended="proximoVideo()"></video>';
    document.getElementById('player-video-wrap').style.display='block';videoAtivo=true;
  }

  async function fetchCSV(gid){
    try{
      const url=CSV_BASE+'&gid='+gid+'&single=true';let text=null;
      // Tentativa 1 — direto
      try{const r=await fetch(url,{redirect:'follow',cache:'no-store'});if(r.ok)text=await r.text();}catch(e){}
      // Tentativa 2 — proxy allorigins
      if(!text){try{const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url));if(r.ok)text=await r.text();}catch(e){}}
      // Tentativa 3 — proxy corsproxy
      if(!text){try{const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(url));if(r.ok)text=await r.text();}catch(e){}}
      if(!text)return[];
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2)return[];
      return lines.slice(3).map(line=>{
        const cols=[];let cur='',inQ=false;
        for(let i=0;i<line.length;i++){
          const c=line[i];
          if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
          else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
          else cur+=c;
        }
        cols.push(cur.trim());return cols;
      });
    }catch(e){return[];}
  }

  async function verificarControle(){
    const rows=await fetchCSV(GID_CONTROLE);
    if(!rows.length) return;
    // Linha 4 da planilha = rows[0] após slice(3)
    // Só executa se col A tiver conteúdo E col B não for '(deixe em branco)'
    const linha=rows[0];
    if(!linha||!linha[0]) return;
    const acao=linha[0].trim().toLowerCase();
    const valor=(linha[1]||'').trim();
    // Ignora linhas de referência (col B contém 'deixe em branco' ou 'youtube.com/watch?v=...')
    if(valor.includes('deixe em branco')||valor.includes('watch?v=...')||valor.includes('seu-arquivo')) return;
    const chave=acao+'|'+valor;
    if(chave===ultimoControle) return;
    ultimoControle=chave;
    if(acao==='radio_on'){modoPlaylist=false;playlist=[];tocarRadio();}
    else if(acao==='radio_off'||acao==='parar'){modoPlaylist=false;playlist=[];pararTudo();}
    else if(acao==='video'&&valor){modoPlaylist=false;playlist=[];_tocarUrlInterna(valor);}
    else if(acao==='playlist'){
      playlist=rows.map(r=>(r[1]||'').trim()).filter(Boolean);
      if(!playlist.length)return;
      modoPlaylist=true;playlistIndex=0;_tocarPlaylistItem(playlist[0]);
    }
  }

  async function carregarAvisos(){
    const rows=await fetchCSV(GID_AVISOS);
    const lista=[];
    rows.filter(r=>r[0]&&!r[0].startsWith('⚙')).forEach(r=>{
      const tipo=(r[2]||'normal').toLowerCase();
      const icones={urgente:'⚠',info:'💡',ok:'✔',normal:'📌'};
      const tags={urgente:'Urgente',info:'Informativo',ok:'Novidade',normal:'Aviso'};
      const titulo=(r[0]||'').replace(/^[^\w\s]+/,'').trim()||r[0];
      lista.push({titulo:titulo,texto:r[1]||'',icone:icones[tipo]||'📌',tag:tags[tipo]||'Aviso'});
    });
    if(!lista.length){
      lista.push({titulo:'Bem-vindo!',texto:'Painel de Comunicacao da Juanil Transportes e Locacoes.',icone:'👋',tag:'Aviso'});
      lista.push({titulo:'Informativo',texto:'Os avisos serao carregados em breve. Verifique a conexao com a internet.',icone:'📌',tag:'Aviso'});
    }
    avisos=lista;clearTimeout(avisoTimer);avisoIdx=0;mostrarAviso(avisos[0]);
  }

  async function carregarTicker(){
    const rows=await fetchCSV(GID_TICKER);
    const textos=rows.map(r=>r[0]).filter(Boolean);
    if(!textos.length)return;
    const el=document.getElementById('ticker-text');
    el.textContent=[...textos,...textos].join('   •   ');
    el.style.animation='none';el.offsetHeight;
    el.style.animation='ticker '+Math.max(90,textos.join('').length*0.45)+'s linear infinite';
  }

  async function carregarFrase(){
    const rows=await fetchCSV(GID_FRASES);
    if(!rows.length)return;
    const f=rows[Math.floor(Date.now()/(1000*60*60*24))%rows.length]||rows[0];
    document.getElementById('frase-texto').textContent='"'+(f[0]||'')+'"';
    document.getElementById('frase-autor').textContent=f[1]?'— '+f[1]:'';
  }

  async function carregarAniversarios(){
    const rows=await fetchCSV(GID_ANIVERSARIOS);
    const hoje=new Date();
    const dH=String(hoje.getDate()).padStart(2,'0'),mH=String(hoje.getMonth()+1).padStart(2,'0');
    const lista=rows.map(r=>{
      const p=(r[1]||'').split('/');const dd=p[0],mm=p[1];
      if(!dd||!mm)return null;
      const ano=hoje.getFullYear();
      let aniv=new Date(ano,parseInt(mm)-1,parseInt(dd));
      const h=new Date(ano,parseInt(mH)-1,parseInt(dH));
      if(aniv<h)aniv.setFullYear(ano+1);
      return{nome:r[0],dd,mm,diff:Math.round((aniv-h)/(1000*60*60*24))};
    }).filter(Boolean).filter(a=>a.diff<=7).sort((a,b)=>a.diff-b.diff);
    const el=document.getElementById('aniversarios-lista');
    if(!lista.length){el.innerHTML='<div style="font-size:1.4vw;color:var(--muted)">Nenhum aniversariante nos proximos 7 dias</div>';return;}
    el.innerHTML=lista.map(a=>{
      const cor=a.diff===0?'#e85555':'var(--acc)';
      return '<div class="aniv-item"><span class="aniv-dia" style="background:'+cor+'">'+(a.diff===0?'HOJE':a.dd+'/'+a.mm)+'</span><span style="color:#fff">'+a.nome+'</span>'+(a.diff===0?' 🎂':'')+'</div>';
    }).join('');
  }

  function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
  async function sincronizar(){await carregarAvisos();await sleep(1200);await carregarTicker();await sleep(1200);await carregarFrase();await sleep(1200);await carregarAniversarios();}
  async function cicloCompleto(){await sincronizar();await verificarControle();}

  // Retentar se avisos ainda estiverem carregando após 15s
  setTimeout(async()=>{
    if(document.getElementById('aviso-titulo').textContent==='Carregando...'){
      await carregarAvisos();
    }
    if(document.getElementById('frase-texto').textContent==='Carregando...'){
      await carregarFrase();
    }
  },15000);

  // Clima
  fetchClima(); setInterval(fetchClima, CLIMA_INT);

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',()=>{initFully();cicloCompleto();setInterval(cicloCompleto,SYNC_INTERVAL);setInterval(verificarControle,30*1000);setTimeout(()=>tocarRadio(),2000);});
  }else{
    initFully();cicloCompleto();setInterval(cicloCompleto,SYNC_INTERVAL);setInterval(verificarControle,30*1000);setTimeout(()=>tocarRadio(),2000);
  }
</script>

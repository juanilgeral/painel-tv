<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juanil — Painel de Avisos</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--azul:#1a3a6b;--azul2:#2457a4;--acc:#f0a500;--text:#ffffff;--muted:#a0b4cc;--danger:#e85555;}
    html,body{width:100vw;height:100vh;overflow:hidden;background:var(--azul);color:var(--text);font-family:'Barlow',sans-serif;}
    .wrapper{display:grid;grid-template-rows:auto 1fr auto;height:100vh;}
    .header{display:flex;align-items:center;justify-content:space-between;padding:14px 36px;background:#0d2348;border-bottom:3px solid var(--acc);position:relative;}
    .logo-wrap{display:flex;align-items:center;gap:18px;flex-shrink:0;}
    .logo-wrap img{height:50px;object-fit:contain}
    .logo-divider{display:none}
    .header-title{position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;}
    .header-title h1{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--acc);letter-spacing:3px;text-transform:uppercase;line-height:1.1;margin:0;}
    .header-title small{display:block;font-size:15px;color:var(--muted);font-weight:400;letter-spacing:2px;margin-top:2px}
    #relogio{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:var(--acc);line-height:1;text-align:right;}
    #data-label{font-size:14px;color:var(--muted);margin-top:2px;text-align:right;text-transform:capitalize}
    .body{display:grid;grid-template-columns:1fr 400px;overflow:hidden;}
    .painel-esq{display:grid;grid-template-rows:1fr auto;overflow:hidden;border-right:1px solid rgba(255,255,255,.08);}
    .painel-avisos{padding:24px 30px;display:flex;flex-direction:column;gap:14px;overflow:hidden;position:relative;}
    .painel-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--acc);padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1);}
    .avisos-lista{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:10px;}
    .aviso-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-left:4px solid var(--acc);border-radius:10px;padding:14px 18px;animation:fadeIn .5s ease;}
    .aviso-card.urgente{border-left-color:#e85555;background:rgba(232,85,85,.08)}
    .aviso-card.info{border-left-color:#4da6ff;background:rgba(77,166,255,.08)}
    .aviso-card.ok{border-left-color:#34d399;background:rgba(52,211,153,.08)}
    .aviso-titulo{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;margin-bottom:5px;}
    .aviso-texto{font-size:18px;color:rgba(255,255,255,.8);line-height:1.6}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .painel-midia{background:#081828;border-top:2px solid var(--azul2);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .midia-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);white-space:nowrap;}
    .midia-btns{display:flex;gap:8px;}
    .btn-midia{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:var(--muted);font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;}
    .btn-midia:hover,.btn-midia.ativo{background:var(--acc);border-color:var(--acc);color:#0d2348;}
    .midia-url-wrap{display:flex;gap:6px;flex:1;min-width:200px;}
    #midia-url-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 12px;color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;outline:none;}
    #midia-url-input:focus{border-color:var(--acc)}
    #midia-url-input::placeholder{color:var(--muted)}
    .btn-tocar{padding:6px 16px;background:var(--acc);border:none;border-radius:6px;color:#0d2348;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
    .midia-status{font-size:12px;color:var(--muted);white-space:nowrap;}
    .midia-status.tocando{color:#34d399;}
    #player-audio{display:none;}
    #player-video-wrap{display:none;position:absolute;inset:0;z-index:10;background:#000;border-radius:0;}
    #player-video-wrap iframe,#player-video-wrap video{width:100%;height:100%;border:none;object-fit:contain;}
    .btn-fechar-video{position:absolute;top:10px;right:14px;background:rgba(0,0,0,.8);border:none;color:white;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:101;}
    .painel-lateral{display:flex;flex-direction:column;background:#0f2040;}
    .lateral-section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
    .frase-wrap{flex:1;padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);}
    .frase-icone{font-size:32px;margin-bottom:10px;opacity:.7}
    #frase-texto{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;line-height:1.4;color:rgba(255,255,255,.9);font-style:italic;}
    #frase-autor{margin-top:8px;font-size:12px;color:var(--muted);}
    .aniversarios-wrap{padding:18px 24px;}
    .aniv-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;}
    .aniv-item:last-child{border:none}
    .aniv-dia{background:var(--acc);color:#0d2348;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;padding:2px 8px;border-radius:4px;min-width:38px;text-align:center;}
    .loading{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;padding:16px;}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:bounce .8s infinite;}
    .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .ticker-wrap{overflow:hidden;background:#0d2348;border-top:2px solid var(--azul2);height:62px;display:flex;align-items:center;}
    .ticker-label{background:var(--acc);color:#0d2348;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;padding:0 22px;height:100%;display:flex;align-items:center;white-space:nowrap;letter-spacing:1px;flex-shrink:0;}
    .ticker-content{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;}
    .ticker-text{white-space:nowrap;font-size:22px;font-weight:500;color:rgba(255,255,255,.9);animation:ticker 30s linear infinite;padding-left:100%;}
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

    /* Indicador Fully Kiosk */
    #fk-status{position:fixed;top:8px;right:12px;font-size:10px;color:rgba(255,255,255,.3);z-index:200;}
  </style>
</head>

      </div>
      <div class="painel-midia">
        <div class="midia-title">🎵 Mídia</div>
        <div class="midia-btns">
          <button class="btn-midia" id="btn-jbfm" onclick="tocarRadio()">📻 JB FM</button>
          <button class="btn-midia" id="btn-parar" onclick="pararTudo()" style="display:none">⏹ Parar</button>
        </div>
        <div class="midia-url-wrap">
          <input id="midia-url-input" type="text" placeholder="Cole URL do YouTube ou arquivo de vídeo/áudio...">
          <button class="btn-tocar" onclick="tocarURL()">▶ Tocar</button>
        </div>
        <div style="display:flex;align-items:center;gap:6px;white-space:nowrap;">
          <span style="font-size:12px;color:var(--muted)">🔊</span>
          <input type="range" id="volume-ctrl" min="0" max="1" step="0.05" value="1"
            style="width:80px;accent-color:var(--acc);cursor:pointer;"
            oninput="ajustarVolume(this.value)">
        </div>
        <div class="midia-status" id="midia-status">Parado</div>
      </div>
    </div>

    <div class="painel-lateral">
      <div class="frase-wrap">
        <div class="frase-icone">💡</div>
        <div id="frase-texto">Carregando...</div>
        <div id="frase-autor"></div>
      </div>
      <div class="aniversarios-wrap">
        <div class="lateral-section-title">🎂 Aniversariantes</div>
        <div id="aniversarios-lista"><div style="font-size:12px;color:var(--muted)">Nenhum aniversariante hoje</div></div>
      </div>
    </div>
  </div>

  <div class="ticker-wrap">
    <div class="ticker-label">📡 AVISO</div>
    <div class="ticker-content">
      <div class="ticker-text" id="ticker-text">Bem-vindo à Juanil Transportes e Locações!</div>
    </div>
  </div>
</div>

<audio id="player-audio"></audio>

<script>
  // ═══════════════════════════════════════════════
  //  CONFIGURAÇÃO
  // ═══════════════════════════════════════════════
  const CSV_BASE         = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcKRIBjR7rebROU5ID-dnNfiA4s7cv4cPCr950-FknrPnm0oOXdvmq_FVxucf-NQ/pub?output=csv';
  const GID_AVISOS       = '1151834973';
  const GID_TICKER       = '1371337128';
  const GID_FRASES       = '867030255';
  const GID_ANIVERSARIOS = '61536774';
  const SYNC_INTERVAL    = 5 * 60 * 1000;
  const JBFM_STREAM      = 'https://27613.live.streamtheworld.com/JBFMAAC.aac';

  // Planilha de controle remoto — aba CONTROLE com colunas: ACAO | VALOR
  // Ações suportadas: radio_on, radio_off, video_url, parar
  const GID_CONTROLE     = '785112419'; // ajuste o gid da aba CONTROLE

  // ── Estado ───────────────────────────────────────
  let radioAtiva  = false;
  let videoAtivo  = false;
  let ultimoControle = '';

  // ── Fully Kiosk API ──────────────────────────────
  let fullyKiosk = null;
  function initFully() {
    if (typeof fully !== 'undefined') {
      fullyKiosk = fully;
      document.getElementById('fk-status').textContent = '✅ Fully Kiosk';
      document.getElementById('fk-status').style.color = '#34d399';
      // Permite autoplay
      fullyKiosk.setFullScreen(true);
      fullyKiosk.turnScreenOn();
    }
  }

  // ── Relógio ──────────────────────────────────────
  function atualizarRelogio() {
    const d = new Date();
    document.getElementById('relogio').textContent =
      String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    const dias  = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    document.getElementById('data-label').textContent =
      `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  }
  atualizarRelogio(); setInterval(atualizarRelogio, 1000);

  // ── Volume ───────────────────────────────────────
  function ajustarVolume(val) {
    const v = val / 100;
    document.getElementById('player-audio').volume = v;
    document.getElementById('vol-label').textContent = val + '%';
    document.getElementById('vol-icon').textContent = val == 0 ? '🔇' : val < 40 ? '🔉' : '🔊';
    // Aplica também em vídeos
    const video = document.querySelector('#player-video-inner video');
    if (video) video.volume = v;
  }

  // ── Status ───────────────────────────────────────
  function setStatus(msg, tocando=false) {
    const el = document.getElementById('midia-status');
    el.textContent = msg;
    el.className = 'midia-status' + (tocando ? ' tocando' : '');
    document.getElementById('btn-parar').style.display = tocando ? 'inline-block' : 'none';
  }

  // ── Parar ────────────────────────────────────────
  function ajustarVolume(val) {
    const audio = document.getElementById('player-audio');
    audio.volume = parseFloat(val);
    const iframe = document.querySelector('#player-video-inner iframe');
    // YouTube não permite controle de volume externo, apenas o próprio player
  }

  function pararAudio() {
    const audio = document.getElementById('player-audio');
    audio.pause(); audio.src = '';
    radioAtiva = false;
  }
  function pararTudo() {
    pararAudio(); fecharVideoSemRetomar(); setStatus('Parado');
  }

  // ── Rádio JB FM ──────────────────────────────────
  function tocarRadio() {
    pararTudo();
    const audio = document.getElementById('player-audio');
    audio.src = JBFM_STREAM;
    audio.play()
      .then(() => { radioAtiva = true; setStatus('📻 JB FM ao vivo', true); })
      .catch(() => {
        // Fallback: YouTube canal JB FM ao vivo
        const wrap = document.getElementById('player-video-wrap');
        document.getElementById('player-video-inner').innerHTML =
          `<iframe src="https://www.youtube.com/embed/live_stream?channel=UCGx9DjFQ6dzBMkIPibPiHOg&autoplay=1&mute=0" allow="autoplay; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000" data-retomar="false"></iframe>`;
        wrap.style.display = 'none'; // invisível — só áudio
        radioAtiva = true;
        setStatus('📻 JB FM ao vivo', true);
      });
  }

  // ── Tocar URL ────────────────────────────────────
  function tocarURL() {
    const url = document.getElementById('midia-url-input').value.trim();
    if (!url) return;
    _tocarUrlInterna(url);
  }

  function _tocarUrlInterna(url) {
    const deveRetomar = radioAtiva;
    if (radioAtiva) pararAudio();
    if (url.includes('youtube.com') || url.includes('youtu.be')) {
      tocarYoutube(url, deveRetomar);
    } else if (/\.(mp3|aac|ogg|wav|m4a)$/i.test(url)) {
      tocarAudioUrl(url);
    } else if (/\.(mp4|webm|mkv|avi)$/i.test(url)) {
      tocarVideoArquivo(url, deveRetomar);
    } else {
      tocarAudioUrl(url);
    }
  }

  function tocarAudioUrl(url) {
    const audio = document.getElementById('player-audio');
    audio.src = url; audio.play()
      .then(() => { radioAtiva = false; setStatus('🎵 Áudio tocando', true); })
      .catch(() => setStatus('❌ Erro ao carregar áudio'));
  }

  function tocarYoutube(url, retornarRadio=false) {
    let id = '';
    const m1 = url.match(/[?&]v=([^&]+)/);
    const m2 = url.match(/youtu\.be\/([^?]+)/);
    const m3 = url.match(/\/live\/([^?]+)/);
    if (m1) id=m1[1]; else if (m2) id=m2[1]; else if (m3) id=m3[1];
    if (!id) { setStatus('❌ URL do YouTube inválida'); return; }
    const wrap = document.getElementById('player-video-wrap');
    document.getElementById('player-video-inner').innerHTML =
      `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen data-retomar="${retornarRadio}"></iframe>`;
    wrap.style.display='block'; videoAtivo=true;
    setStatus('▶ YouTube tocando', true);
  }

  function tocarVideoArquivo(url, retornarRadio=false) {
    const wrap = document.getElementById('player-video-wrap');
    document.getElementById('player-video-inner').innerHTML =
      `<video src="${url}" autoplay controls style="width:100%;height:100%;object-fit:contain;background:#000" data-retomar="${retornarRadio}" onended="aoTerminarVideo()"></video>`;
    wrap.style.display='block'; videoAtivo=true;
    setStatus('▶ Vídeo tocando', true);
  }

  function fecharVideo() {
    const inner = document.getElementById('player-video-inner');
    const el = inner.querySelector('[data-retomar]');
    const deveRetomar = el && el.dataset.retomar === 'true';
    fecharVideoSemRetomar();
    if (deveRetomar) setTimeout(() => tocarRadio(), 500);
  }

  function fecharVideoSemRetomar() {
    document.getElementById('player-video-wrap').style.display='none';
    document.getElementById('player-video-inner').innerHTML='';
    videoAtivo=false;
    if (!radioAtiva) setStatus('Parado');
  }

  function aoTerminarVideo() { fecharVideo(); }

  // ── CSV ───────────────────────────────────────────
  async function fetchCSV(gid) {
    try {
      const url = CSV_BASE + '&gid=' + gid + '&cachebust=' + Date.now();
      // Tenta direto primeiro, se falhar usa proxy CORS
      let resp;
      try {
        resp = await fetch(url);
        if (!resp.ok) throw new Error('direct failed');
      } catch(e) {
        resp = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
      }
      const text = await resp.text();
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return [];
      return lines.slice(3).map(line => {
        const cols=[]; let cur='', inQ=false;
        for (let i=0;i<line.length;i++) {
          const c=line[i];
          if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
          else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
          else cur+=c;
        }
        cols.push(cur.trim()); return cols;
      });
    } catch(e) { return []; }
  }

  // ── CONTROLE REMOTO via planilha ──────────────────
  // Aba CONTROLE: coluna A = ACAO, coluna B = VALOR
  // Ações: radio_on | radio_off | parar | video:<URL>
  async function verificarControle() {
    if (CSV_BASE === 'SEU_CSV_URL_AQUI') return;
    const rows = await fetchCSV(GID_CONTROLE);
    if (!rows.length) return;
    const acao  = (rows[0][0]||'').trim().toLowerCase();
    const valor = (rows[0][1]||'').trim();
    const chave = acao + valor;
    if (chave === ultimoControle) return; // já executou
    ultimoControle = chave;

    if (acao === 'radio_on')  { tocarRadio(); }
    else if (acao === 'radio_off' || acao === 'parar') { pararTudo(); }
    else if (acao === 'video' && valor) {
      document.getElementById('midia-url-input').value = valor;
      _tocarUrlInterna(valor);
    }
  }

  // ── Avisos ────────────────────────────────────────
  async function carregarAvisos() {
    const rows = await fetchCSV(GID_AVISOS);
    const lista = document.getElementById('avisos-lista');
    if (!rows.length) {
      lista.innerHTML='<div style="color:var(--muted);font-size:14px;padding:16px">Nenhum aviso no momento.</div>';
      return;
    }
    lista.innerHTML = rows.map(r => {
      const tipo=(r[2]||'normal').toLowerCase();
      return `<div class="aviso-card ${tipo}"><div class="aviso-titulo">${r[0]||''}</div><div class="aviso-texto">${r[1]||''}</div></div>`;
    }).join('');
  }

  async function carregarTicker() {
    const rows = await fetchCSV(GID_TICKER);
    const el = document.getElementById('ticker-text');
    const anoAtual = new Date().getFullYear();
    const textos = rows.map(r=>r[0]).filter(Boolean).map(t =>
      t.replace(/desde (\d{4}) há \d+ anos/g, (_, ano) =>
        `desde ${ano} há ${anoAtual - parseInt(ano)} anos`
      )
    );
    if (!textos.length) return;
    el.textContent = textos.join('   •   ');
    el.style.animation='none'; el.offsetHeight;
    el.style.animation = `ticker ${Math.max(20,textos.join('').length*0.12)}s linear infinite`;
  }

  async function carregarFrase() {
    const rows = await fetchCSV(GID_FRASES);
    if (!rows.length) return;
    const f = rows[Math.floor(Date.now()/(1000*60*60*24))%rows.length]||rows[0];
    document.getElementById('frase-texto').textContent='"'+(f[0]||'')+'"';
    document.getElementById('frase-autor').textContent=f[1]?'— '+f[1]:'';
  }

  async function carregarAniversarios() {
    const rows = await fetchCSV(GID_ANIVERSARIOS);
    const hoje=new Date();
    const dH=String(hoje.getDate()).padStart(2,'0');
    const mH=String(hoje.getMonth()+1).padStart(2,'0');
    const lista=rows.map(r=>{
      const [dd,mm]=(r[1]||'').split('/');
      if(!dd||!mm) return null;
      const ano=hoje.getFullYear();
      let aniv=new Date(ano,parseInt(mm)-1,parseInt(dd));
      const h=new Date(ano,parseInt(mH)-1,parseInt(dH));
      if(aniv<h) aniv.setFullYear(ano+1);
      return {nome:r[0],dd,mm,diff:Math.round((aniv-h)/(1000*60*60*24))};
    }).filter(Boolean).filter(a=>a.diff<=7).sort((a,b)=>a.diff-b.diff);
    const el=document.getElementById('aniversarios-lista');
    if(!lista.length){el.innerHTML='<div style="font-size:12px;color:var(--muted)">Nenhum aniversariante nos próximos 7 dias</div>';return;}
    el.innerHTML=lista.map(a=>{
      const cor=a.diff===0?'#e85555':'var(--acc)';
      return `<div class="aniv-item"><span class="aniv-dia" style="background:${cor}">${a.diff===0?'HOJE':a.dd+'/'+a.mm}</span><span>${a.nome}</span>${a.diff===0?'<span style="font-size:16px">🎂</span>':''}</div>`;
    }).join('');
  }

  // ── Sincronizar ───────────────────────────────────
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function sincronizar() {
    await carregarAvisos();   await sleep(1500);
    await carregarTicker();   await sleep(1500);
    await carregarFrase();    await sleep(1500);
    await carregarAniversarios();
  }

  async function cicloCompleto() {
    await sincronizar();
    await verificarControle();
  }

  // ── Init ──────────────────────────────────────────
  window.addEventListener('load', () => {
    initFully();

    if (CSV_BASE !== 'SEU_CSV_URL_AQUI') {
      cicloCompleto();
      setInterval(cicloCompleto, SYNC_INTERVAL);
      // Controle remoto verifica a cada 15 segundos
      setInterval(verificarControle, 30 * 1000);
      // Toca rádio automaticamente após 2s (Fully Kiosk permite)
      setTimeout(() => tocarRadio(), 2000);
    } else {
      // DEMO
      document.getElementById('avisos-lista').innerHTML=`
        <div class="aviso-card ok"><div class="aviso-titulo">✅ Painel funcionando!</div><div class="aviso-texto">Configure a planilha Google Sheets e cole a URL no campo CSV_BASE do código.</div></div>
        <div class="aviso-card info"><div class="aviso-titulo">📋 Controle remoto</div><div class="aviso-texto">Adicione a aba CONTROLE na planilha. Coluna A: radio_on / radio_off / parar / video. Coluna B: URL (para vídeo).</div></div>
        <div class="aviso-card urgente"><div class="aviso-titulo">🔴 Aviso urgente — exemplo</div><div class="aviso-texto">Tipos disponíveis: normal, urgente, info, ok.</div></div>`;
      document.getElementById('ticker-text').textContent='Bem-vindo à Juanil Transportes e Locações!   •   Configure a planilha para controle remoto   •   JB FM toca automaticamente ao abrir';
      document.getElementById('frase-texto').textContent='"O sucesso é a soma de pequenos esforços repetidos dia após dia."';
      document.getElementById('frase-autor').textContent='— Robert Collier';
      document.getElementById('aniversarios-lista').innerHTML=`
        <div class="aniv-item"><span class="aniv-dia" style="background:#e85555">HOJE</span><span>João Silva</span><span style="font-size:16px">🎂</span></div>
        <div class="aniv-item"><span class="aniv-dia">15/06</span><span>Maria Santos</span></div>`;
    }
  });
</script>
</body>
</html>
